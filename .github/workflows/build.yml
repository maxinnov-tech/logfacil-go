# Arquivo: .github/workflows/build.yml
# Descrição: Definição da pipeline de Integração e Deploy Contínuo (CI/CD) no GitHub Actions.
# Orquestra as etapas de compilação automática: inicializa servidor de build no Windows, 
# instala Go, Node.js e Wails CLI, gera o arquivo Exe.
name: Build e Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*' # Aciona apenas se você criar/enviar uma tag que comece com 'v', exemplo: 'v2.1.2-GO'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Fazer Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Instalar Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Build do Wails
      run: wails build

    - name: Criar Release e Fazer Upload
      uses: softprops/action-gh-release@v2
      with:
        files: build/bin/LogFacil-GO.exe
        name: LogFacil ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
