# Arquivo: .github/workflows/build.yml
# Descrição: Definição da pipeline de Integração e Deploy Contínuo (CI/CD) no GitHub Actions.
# Orquestra as etapas de compilação automática: inicializa servidor de build no Windows, 
# instala Python e os requirements listados, gera dinamicamente o arquivo Exe usando o 
# PyInstaller com a versão especificada na Tag do Git e cria a Release automaticamente.
name: Build e Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*' # Aciona apenas se você criar/enviar uma tag que comece com 'v', exemplo: 'v1.1.9'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Fazer Checkout do Código
      uses: actions/checkout@v4

    - name: Mapear Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Versão recomendada para estabilidade com PyInstaller
        cache: 'pip'

    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compilar o Executável (.exe)
      run: |
        pyinstaller --clean LogFacil.spec

    - name: Criar Release e Fazer Upload
      uses: softprops/action-gh-release@v2
      with:
        files: dist/LogFacil.exe
        name: LogFacil ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
